training:
  epochs: 50
  batch_size: 128
  optimizer: sgd
  lr: 0.1
  momentum: 0.9
  weight_decay: 5.0e-4
  scheduler: cosine

co_training:
  label_smoothing: 0.0
  little_loss_type: "ce"
  cascade_aware: false

evaluation:
  threshold_sweep: [0.5, 0.6, 0.7, 0.8, 0.9, 0.95]
  temperature_scaling: false
  metrics: [cascade_acc, exit_ratio, cascade_flops, little_ece, routing_error_rate]

data:
  dataset: cifar10
  num_workers: 4

seed: 42
experiment_name: cifar10_A_retrain_ce_only
